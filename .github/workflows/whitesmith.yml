# NOTE: This workflow requires the repo setting:
#   Settings → Actions → General → "Allow GitHub Actions to create and approve pull requests"
# Without this, PR creation will fail with a permissions error.
name: whitesmith

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      max_iterations:
        description: 'Maximum iterations'
        default: '3'
        type: string
      provider:
        description: 'AI provider (e.g. anthropic)'
        required: false
        type: string
      model:
        description: 'AI model ID (e.g. claude-opus-4-6)'
        required: false
        type: string

concurrency:
  group: whitesmith-loop
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure git
        run: |
          git config user.name "whitesmith[bot]"
          git config user.email "whitesmith[bot]@users.noreply.github.com"

      - name: Get npm global prefix
        id: npm-prefix
        run: echo "dir=$(npm prefix -g)" >> "$GITHUB_OUTPUT"

      - name: Cache global npm packages
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.npm-prefix.outputs.dir }}
          key: npm-global-${{ runner.os }}-pi-v1

      - name: Install whitesmith and pi
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: |
          npm install -g whitesmith
          npm install -g @mariozechner/pi-coding-agent

      - name: Configure pi models
        run: |
          mkdir -p ~/.pi/agent
          cat > ~/.pi/agent/models.json << 'MODELS_EOF'
          {
            "providers": {
              "anthropic": {
                "baseUrl": "https://claude.etherplay.io",
                "api": "anthropic-messages",
                "apiKey": "CLAUDE_API_KEY",
                "models": [
                  {
                    "id": "claude-opus-4-6"
                  }
                ]
              }
            }
          }
          MODELS_EOF

      - name: Run whitesmith
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          PROVIDER="${{ inputs.provider || 'anthropic' }}"
          MODEL="${{ inputs.model || 'claude-opus-4-6' }}"
          whitesmith run . \
            --agent-cmd "pi" \
            --provider "$PROVIDER" \
            --model "$MODEL" \
            --max-iterations ${{ inputs.max_iterations || '3' }}
