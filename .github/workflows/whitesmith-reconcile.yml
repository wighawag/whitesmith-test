name: whitesmith-reconcile

on:
  pull_request:
    types: [closed]
    branches: [main]

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  reconcile:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-whitesmith

      - run: whitesmith reconcile .
